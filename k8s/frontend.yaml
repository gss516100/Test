apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-manager-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-manager-frontend
  template:
    metadata:
      labels:
        app: stock-manager-frontend
    spec:
      containers:
        - name: frontend
          image: stock-manager-frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: stock-manager-frontend
spec:
  selector:
    app: stock-manager-frontend
  ports:
    - port: 80
      targetPort: 3000
